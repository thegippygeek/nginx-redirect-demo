# compose.yaml — ENV-01: the whole rig, one command.
# No `version:` key — obsolete in Compose v2+ and it emits a warning.
name: demo

services:
  # D-16: server-old and server-new are the SAME image. The only difference
  # between them is BACKEND_ID. That is what makes "the only thing that
  # changed is which server answered" an honest claim.
  server-old:
    build: ./backend
    image: demo-backend:1
    hostname: server-old
    init: true                      # tini as PID 1 under supervisord
    environment:
      BACKEND_ID: OLD
      BACKEND_COLOR: "#b45309"
    # Loopback-bound on purpose: the browser reaches this via D-03's
    # /etc/hosts mapping of app.demo.test -> 127.0.0.1, so binding 0.0.0.0
    # would only offer the rig to conference wifi for no benefit (T-01-06).
    ports: ["127.0.0.1:9090:80"]
    # READ-ONLY, deliberately (D-41 / T-03-05). See the volumes block at the foot.
    volumes:
      - demo-keys:/keys:ro
      # Host-local time. Every timestamp the presenter or the room sees — the
      # status-page clock, the access-log lines in `make logs` — must read as
      # the wall clock in the room, not UTC. Mounting the host's own
      # /etc/localtime makes the container follow whatever host runs the demo,
      # with no tzdata package and no hardcoded zone (musl reads this file
      # directly; a bare `TZ=` env would silently stay UTC on Alpine).
      - /etc/localtime:/etc/localtime:ro
    # Load-bearing, not decorative: plan 01-02's proxy gates on
    # `condition: service_healthy` because nginx refuses to start when an
    # upstream hostname does not yet resolve (RESEARCH Pitfall 4).
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/healthz"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 3s

  server-new:
    image: demo-backend:1           # no build: — same image, not a second build (D-16)
    depends_on: [server-old]        # ensures the image is built before this starts
    hostname: server-new
    init: true
    environment:
      BACKEND_ID: NEW
      BACKEND_COLOR: "#15803d"
    ports: ["127.0.0.1:9091:80"]
    volumes:
      - demo-keys:/keys:ro
      # Host-local time — see server-old. Both backends log in the room's zone.
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/healthz"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 3s

  # THE SWITCH — the migration endpoint and the flip surface (Phase 5). This is
  # v1's `proxy` service, re-homed: it no longer talks to the backends directly.
  # Its upstreams now point at the two static proxies, and it is the ONE tier the
  # presenter flips. Same pinned nginx as the backends, so there is one nginx
  # version to explain on stage. It is also now the sole evidence WRITER.
  switch:
    image: nginx:1.30-alpine
    volumes:
      # Host-local time — see server-old. nginx renders $time_iso8601 in this
      # zone, so the evidence log and `make logs` match the room's wall clock.
      - /etc/localtime:/etc/localtime:ro
      # The DIRECTORY is mounted, not the single file (RESEARCH Pitfall 10):
      # an editor that replaces the file's inode on the presenter's machine
      # cannot leave the container holding stale content.
      - ./switch:/etc/nginx/demo:ro
      - ./switch/nginx.conf:/etc/nginx/nginx.conf:ro
      # The evidence log (D-29). Read-write HERE — the switch is now the front
      # tier and the only evidence writer; read-only for the status service. The
      # mount point is /var/log/demo and NOT the image's own log directory: that
      # ships access.log as a symlink to the process stdout, and a volume mounted
      # over it pre-populates from the image layer including that symlink — after
      # which no real file is ever created and a reader hangs rather than erroring.
      - demo-logs:/var/log/demo
    # Probes the unpublished :8081 listener, never :9092: the smoke suite writes
    # an invalid selector into 9092's path on purpose, and the probe would
    # otherwise land in the projected evidence table every 3 seconds.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/nginx-health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 3s
    # 9092 proxies, 9093 redirects. Same explicit loopback binding as the
    # backends (T-01-15) — the rig is never offered to conference wifi.
    ports: ["127.0.0.1:9092:9092", "127.0.0.1:9093:9093"]
    networks:
      default:
        # SW-01 / D-01/D-02: the client container resolves the real hostname
        # straight to the SWITCH through Docker's embedded DNS. This alias MOVED
        # here from v1's `proxy` service — the client's unchanged command now
        # lands on the switch. Deliberately NOT `extra_hosts: host-gateway`,
        # which resolved to IPv6 and routed the client out to the host and back
        # in, hiding its real IP from the log.
        aliases: [app.demo.test]
    # LOAD-BEARING, not decorative — and now one tier DEEPER (RESEARCH Pitfall 1).
    # nginx resolves `upstream ... server <name>` at config-PARSE time and aborts
    # with `host not found in upstream` if Docker DNS cannot answer yet. The
    # switch parses `upstream proxy-old/proxy-new` on every reload, so it gates on
    # the STATIC PROXIES being healthy, not the backends directly. This cascade is
    # what makes `docker compose up -d --wait` deterministic (MIG-01).
    depends_on:
      proxy-old: {condition: service_healthy}
      proxy-new: {condition: service_healthy}

  # STATIC PROXY → server-old. A reduction of v1's proxy: one fixed upstream, no
  # flip machinery, no evidence sink. It is NEVER reconfigured (PROX-01) — the
  # switch does all the flipping. Publishes NOTHING: internal-only, reachable only
  # from the switch and other containers on the demo network (T-05-04).
  proxy-old:
    image: nginx:1.30-alpine
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./proxy-old:/etc/nginx/demo:ro
      - ./proxy-old/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/nginx-health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 3s
    networks:
      default:
        # PROX-03: a distinct alias per static proxy. app-old.demo.test reaches
        # this tier directly (its SSH:22 stream is live this phase).
        aliases: [app-old.demo.test]
    # Gates on ITS OWN backend: nginx resolves `server server-old:80` at parse
    # time, so this proxy must not start before server-old answers.
    depends_on:
      server-old: {condition: service_healthy}
    # NO ports: — the static proxies expose no host ports at all (T-05-04).

  # STATIC PROXY → server-new. Exact mirror of proxy-old (./proxy-new, the
  # app-new.demo.test alias, and server-new). Also publishes nothing (PROX-02).
  proxy-new:
    image: nginx:1.30-alpine
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./proxy-new:/etc/nginx/demo:ro
      - ./proxy-new/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/nginx-health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 3s
    networks:
      default:
        aliases: [app-new.demo.test]
    depends_on:
      server-new: {condition: service_healthy}
    # NO ports: — internal-only (T-05-04).

  # D-25: the evidence service. A fourth container, deliberately small.
  # Rejected alternatives: an nginx location on the proxy (nginx alone cannot
  # render a request history without a helper) and a static file regenerated by
  # a script (goes stale unless something drives it on a timer).
  status:
    # A Docker Official Image, pulled and executed during research (74.1 MB,
    # Python 3.13.14). No `build:` and no Dockerfile: status.py imports nothing
    # outside the standard library, so there is nothing to install and a build
    # step on `make up` would buy the presenter nothing but a wait.
    image: python:3.13-alpine
    # -u is load-bearing: without it stdout buffering swallows the service's
    # own diagnostics and they never reach `docker compose logs status`.
    command: ["python3", "-u", "/app/status.py"]
    # Re-pointed to the SWITCH (Phase 5). The status service reads the switch's
    # active-proxy.conf selector and probes the switch's unpublished :8081 health
    # listener. status.py carries the same values as its module defaults so it is
    # honest standalone; these make the wiring explicit at the compose layer.
    environment:
      DEMO_PROXY_PROBE: http://switch:8081/nginx-health
      DEMO_CONF_PATH: /etc/nginx/demo/active-proxy.conf
    volumes:
      # ALL FOUR MOUNTS ARE READ-ONLY, and the evidence one is the load-bearing
      # one: it is what lets the reading be believed. The tier that REPORTS the
      # evidence provably cannot alter it. That is also why D-36's truncation is
      # issued into the proxy container rather than here, and why no
      # container-runtime socket is mounted anywhere in this project (D-29 — a
      # full privilege escalation on a machine that may not be the presenter's).
      - ./status:/app:ro
      # The DIRECTORY, not the single file (RESEARCH Pitfall 10). D-34 documents
      # editing active-backend.conf live in an editor as the more dramatic
      # presenter option, and an editor that replaces the file's inode would
      # leave a single-file mount holding stale content forever — the status
      # page would then report a cutover that had already happened as PENDING.
      # The switch mounts the same directory for the same reason. Re-pointed to
      # ./switch (Phase 5): the selector the status page reads is now the
      # switch's active-proxy.conf, not v1's proxy/active-backend.conf.
      - ./switch:/etc/nginx/demo:ro
      - demo-logs:/var/log/demo:ro
      # Host-local time — see server-old. This is THE surface that matters: the
      # projected status clock (served_at, traffic_at) is rendered here via
      # time.localtime(), which reads /etc/localtime.
      - /etc/localtime:/etc/localtime:ro
    # Loopback only, continuing 9090/9091/9092/9093's narration mnemonic. The
    # rig is never offered to conference wifi (T-02-05).
    ports: ["127.0.0.1:9094:9094"]
    # busybox `wget`, NOT the `curl -fsS` idiom every other service here uses:
    # curl is ABSENT from python:3.13-alpine. Do not "fix" this back — it will
    # look inconsistent and it is deliberate.
    #
    # And 127.0.0.1, not `localhost`. busybox resolves localhost to ::1 first
    # and does NOT retry the next address family the way curl does, so against
    # this IPv4 listener it fails with "connection refused" while the service is
    # perfectly healthy. The other services get away with `localhost` only
    # because they probe with curl.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:9094/healthz"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 3s
    # NO depends_on the switch, deliberately. UI-SPEC acceptance test 4 stops the
    # front tier and expects UNAVAILABLE within 5 s; a health dependency risks
    # Compose taking this service down with the switch, leaving nothing to render
    # the very state D-28 exists to guarantee. This service is at its MOST
    # valuable when the switch is dead.

  # D-02: a command source, not a service. No published ports. From Phase 3
  # this is the canonical SSH source — it reaches the backends entirely over
  # the Docker network, so no host port 22 binding is ever needed.
  client:
    build: ./client
    # This stays exactly as it was: it is now the ENTRYPOINT's argument, and the
    # entrypoint execs it. No healthcheck is added here on purpose — D-02 makes
    # this a command source, not a service, and giving it a health contract
    # would invite depends_on edges the rig does not want.
    command: ["sleep", "infinity"]
    # The ONLY read-write mount of the keypair. See the volumes block at the foot.
    volumes:
      - demo-keys:/keys
    depends_on: [switch]

# D-29: the status service reads the proxy's evidence log through this shared
# named volume. Mounting the Docker socket to read container stdout was
# considered and rejected — a real privilege escalation in a demo that might be
# run on someone else's machine.
#
# It survives `docker compose down` and is removed only by `down -v`, so `make
# up` truncates the log: silently resuming a prior take's counters mid-count is
# exactly the "looks second-hand" failure D-36 exists to prevent.
volumes:
  demo-logs:

  # D-41: the demo keypair. Generated on first run by client/entrypoint.sh,
  # never committed and never written to the host filesystem (T-03-01).
  #
  # The read-write / read-only asymmetry deliberately mirrors the evidence-log
  # idiom directly above: the tier that CONSUMES provably cannot alter what it
  # consumes. Read-write on `client` only; `:ro` on both backends.
  #
  # A fresh named volume mounts root-owned and neither group- nor
  # world-writable. That — plus 644 on authorized_keys — is what satisfies
  # sshd's StrictModes for an AuthorizedKeysFile outside the user's home
  # (T-03-05).
  #
  # `make reset` runs `down -v`, which removes this volume, so the keys
  # regenerate on the next `up`. That is correct behaviour, and it is the reason
  # nothing here needs a .gitignore entry.
  demo-keys:

# Container port 22 is published NOWHERE in this phase (D-15). The image
# carries a `demo:demo` credential; keeping it off the host is threat
# T-01-02's mitigation.
