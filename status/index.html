<!doctype html>
<!-- status/index.html — the projected cutover surface (D-23, D-24, D-26, D-27, D-28).

     ONE file. Inline style, inline script, zero external references of any kind:
     no hosted stylesheet, no web font, no remote script, no image. ENV-03
     requires the whole rig to run with no internet at all, and a demo that shows
     a broken layout on a conference network has already failed.

     Served as a STATIC file by the status service, deliberately not templated
     server-side: the 5 s staleness watchdog below is the only mechanism that can
     notice this page's own server dying, and server-side templating cannot do it.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>cutover status</title>
<style>
/* ------------------------------------------------------------ tokens */
:root{
  --font-ui: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;

  --bg:#0b0f14;      /* page ground and every panel interior */
  --panel:#161d26;   /* secondary fill — reinforcement only, never the edge */
  --line:#2b3542;    /* 2px panel borders and 1px row separators */
  --fg:#ffffff;
  --mut:#9fb0c0;
  --old:#b45309;     /* lifted verbatim from compose.yaml BACKEND_COLOR */
  --new:#15803d;     /* ditto — the audience learns this language once */
  --dead:#334155;    /* the UNAVAILABLE fill. Deliberately a slate, not a hue */

  /* Exactly four sizes. A fifth is a contract failure. */
  --fs-hero:12.5rem; --fs-display:4.5rem; --fs-label:2rem; --fs-meta:1.375rem;

  --xs:.25rem; --sm:.5rem; --md:1rem; --lg:1.5rem; --xl:2rem; --safe:3rem;

  /* Uniform table row height. UI-SPEC quotes 68px (4.25rem) as its reference
     value; the shipped value is lowered to fit the 1080 budget without a
     scrollbar — see the 02-03 summary, deviation 1. Uniformity is what the
     boundary rule depends on, and uniformity is preserved exactly. */
  --row-h:3.25rem;
}

/* The root scale hook. Divides a length by a plain NUMBER, which is the only
   form valid inside calc(); every size below is expressed in rem from here. */
html{ font-size: calc(100vw / 120); }

html,body{ height:100%; overflow: hidden; }
body{
  margin:0; background:var(--bg); color:var(--fg);
  font-family:var(--font-ui); font-weight:400;
  -webkit-font-smoothing:antialiased;
}
*{ box-sizing:border-box; }

/* ------------------------------------------------------------ layout
   1920x1080, fixed. 48px projector safe area on all four sides; the footer
   band is the one declared exception, carrying presenter-facing diagnostics
   only. Rows sum to exactly 100vh so no scrollbar can ever exist. */
.page{
  height:100vh;
  padding: var(--safe) var(--safe) 0;
  display:grid;
  grid-template-rows:
    7rem      /* config strip   */
    1rem      /* gap            */
    2.5rem    /* sync marker    */
    .5rem     /* gap            */
    18.5rem   /* traffic banner */
    1.5rem    /* gap            */
    30.5rem   /* evidence row   */
    3rem;     /* footer band    */
}

.panel{ background:var(--panel); border:2px solid var(--line); }

/* ------------------------------------------------- 1. the config strip */
.config{
  display:flex; align-items:center; justify-content:space-between;
  padding:0 var(--xl);
}
.config .lbl{
  font-size:var(--fs-label); font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--mut);
}
.chip{
  font-size:var(--fs-display); font-weight:700; line-height:1.05;
  letter-spacing:-.01em; text-transform:uppercase;
  padding: var(--xs) var(--lg);
  background:var(--old); color:var(--fg);
}
.chip.b-OLD{ background:var(--old); }
.chip.b-NEW{ background:var(--new); }
.chip.b-none{ background:var(--panel); color:var(--mut); }
.pending .chip{ outline:4px solid #fff; outline-offset:8px; }

/* --------------------------------------------------- 2. the sync marker
   The 40px strip that carries the whole D-27 story. Three captions. */
.sync{ display:flex; align-items:center; gap:var(--lg); }
.sync .rule{ flex:1 1 auto; height:4px; background:var(--line); }
.sync .cap{
  font-size:var(--fs-label); font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--mut); white-space:nowrap;
}
.pending .sync .cap{ color:var(--fg); }
.pending .sync .rule{
  background: repeating-linear-gradient(90deg,#fff 0 24px, transparent 24px 40px);
}
.pending .sync{ animation: pulse 1600ms ease-in-out infinite; }
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.55} }

/* ------------------------------------------------ 3. the traffic banner
   Hero, 2.8x the config reading. Config is intent; traffic is evidence, and
   evidence outranks intent — the element that changes during the money shot
   is the biggest thing on screen. Never side by side with config. */
.traffic{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:var(--old);
}
.traffic.b-OLD{ background:var(--old); }
.traffic.b-NEW{ background:var(--new); }
.traffic.b-none{ background:var(--panel); }
.traffic.b-dead{ background:var(--dead); }
.traffic .lbl{
  font-size:var(--fs-label); font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--fg); opacity:.85;
}
.hero{
  font-size:var(--fs-hero); font-weight:700; line-height:1;
  letter-spacing:-.02em; text-transform:uppercase;
}
.hero.small{ font-size:var(--fs-display); line-height:1.05; letter-spacing:-.01em; }
.hero.muted{ color:var(--mut); }
.traffic .sub{ font-size:var(--fs-meta); font-weight:400; color:var(--fg); opacity:.9; }
.traffic.b-none .sub, .traffic.b-none .lbl{ color:var(--mut); opacity:1; }

/* ------------------------------------------------- 4. the evidence row */
.evidence{ display:grid; grid-template-columns: 73.5rem 3rem 37.5rem; }

/* --- 4a. the recent-requests table.
   Five FIXED-pixel columns: 12 + 200 + 620 + 120 + 224 = 1176. Fixed, not
   fractional, so a growing path string cannot reflow the columns and make the
   boundary rule appear to move. */
.tbl{ display:flex; flex-direction:column; }
.thead,.row{
  display:grid;
  grid-template-columns: .75rem 12.5rem 38.75rem 7.5rem 14rem;
  align-items:center;
}
.thead{
  height:3rem; background:var(--panel);
  border-bottom:1px solid var(--line);
  font-size:var(--fs-meta); font-weight:400; color:var(--mut);
  letter-spacing:.08em; text-transform:uppercase;
}
.thead span{ padding:0 var(--lg); }
.thead .h-time{ padding:0 var(--md); }
.thead .h-backend{ text-align:right; }

.tbody{ display:flex; flex-direction:column; }

/* Uniform height, always. A wrapped row would break the uniformity the
   boundary rule's pixel position depends on, which is why a long path is
   truncated rather than wrapped. */
.row{
  height:var(--row-h);
  border-bottom:1px solid var(--line);
  color:var(--fg); background:var(--old);
  font-size:var(--fs-label); font-weight:400; line-height:1.3;
  font-variant-numeric: tabular-nums;
}
.row.b-NEW{ background:var(--new); }
.row.b-OLD{ background:var(--old); }
.row span{ padding:0 var(--lg); overflow: hidden; white-space:nowrap; }
.row .c-time{ font-family:var(--font-mono); padding:0 var(--md); }
.row .c-path{ font-family:var(--font-mono); text-overflow:ellipsis; }
.row .c-status{ font-family:var(--font-mono); }
.row .c-backend{ font-weight:700; text-align:right; letter-spacing:.08em; }

/* The SHAPE channel. OLD and NEW are isoluminant, so colour alone carries
   nothing in greyscale: the bar is white against the accent fill and takes a
   square cap for OLD, a chamfered peak for NEW. */
.row .bar{ height:100%; padding:0; background:#fff; }
.row.b-NEW .bar{ clip-path: polygon(0 100%, 0 1rem, 50% 0, 100% 1rem, 100% 100%); }

/* --- 4b. the flip boundary. An 8px white rule is the highest-contrast object
   on the page and it is a STRUCTURAL discontinuity: the table visibly breaks
   in half. The colour change is the corroboration; the rule is the claim. */
.bnd{ flex:0 0 auto; }
.bnd-rule{ height:8px; background:#fff; }
.bnd-cap{
  height:3rem; background:var(--bg); color:var(--fg);
  display:flex; align-items:center; justify-content:center;
  font-size:var(--fs-label); font-weight:700; letter-spacing:.08em;
  font-variant-numeric: tabular-nums;
}

/* --- 4c. the empty state. Never blank filler rows: an empty row on a
   projector reads as "still loading" and undermines the evidence claim. */
.empty{
  flex:1 1 auto; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:var(--md);
  padding:0 var(--xl); text-align:center;
  font-size:var(--fs-label); color:var(--mut); line-height:1.3;
}
.empty .eh{ font-weight:700; letter-spacing:.08em; }
.empty .eb{ font-weight:400; }

/* --- 4d. the stats rail. OLD is ALWAYS the top tile and the rail is never
   sorted by count — position is a signal channel. */
.rail{ display:flex; flex-direction:column; gap:var(--md); padding:var(--md); }
.tile{
  display:flex; align-items:center; justify-content:space-between;
  padding:0 var(--lg); color:var(--fg);
}
.t-old{ height:8.75rem; background:var(--old); }
.t-new{ height:8.75rem; background:var(--new); }
.t-flip{ height:7.75rem; background:var(--bg); border:2px solid var(--line); }
.tile .tl{
  font-size:var(--fs-label); font-weight:700;
  letter-spacing:.08em; text-transform:uppercase;
}
.t-flip .tl{ color:var(--mut); }
.tile .tv{
  font-size:var(--fs-display); font-weight:700; line-height:1.05;
  letter-spacing:-.01em; font-variant-numeric: tabular-nums;
}

/* ------------------------------------------------------- 5. the footer */
.foot{
  display:flex; align-items:center; gap:var(--sm);
  font-size:var(--fs-meta); font-weight:400; color:var(--mut);
}
.foot.stale{ color:var(--fg); background:var(--dead); padding:0 var(--md); }
#beat{ transition:none; }
</style>
</head>
<body>
<!-- The initial paint ships the NO-TRAFFIC state inline. No spinner and no
     skeleton: the first poll lands within 1000 ms, which is less time than it
     takes to recognise a skeleton for what it is. -->
<div class="page" id="page">

  <section class="config panel" id="config">
    <span class="lbl">CONFIG SAYS</span>
    <span class="chip b-none" id="cfgWord">&mdash;</span>
  </section>

  <div></div>

  <div class="sync" id="sync">
    <span class="rule"></span>
    <span class="cap" id="syncCap">AWAITING FIRST REQUEST</span>
    <span class="rule"></span>
  </div>

  <div></div>

  <section class="traffic b-none" id="traffic">
    <span class="lbl">TRAFFIC SHOWS</span>
    <span class="hero muted" id="heroWord">&mdash;</span>
    <span class="sub" id="trafficSub">NO TRAFFIC OBSERVED YET</span>
  </section>

  <div></div>

  <section class="evidence">
    <div class="panel tbl">
      <div class="thead">
        <span class="h-bar"></span>
        <span class="h-time">TIME</span>
        <span class="h-path">PATH</span>
        <span class="h-status">STATUS</span>
        <span class="h-backend">BACKEND</span>
      </div>
      <div class="tbody" id="tbody">
        <div class="empty">
          <div class="eh">NO TRAFFIC OBSERVED YET</div>
          <div class="eb">Send a request to http://app.demo.test:9092/ and it will appear here.</div>
        </div>
      </div>
    </div>
    <div></div>
    <div class="panel rail">
      <div class="tile t-old"><span class="tl">OLD</span><span class="tv" id="cOld">0</span></div>
      <div class="tile t-new"><span class="tl">NEW</span><span class="tv" id="cNew">0</span></div>
      <div class="tile t-flip"><span class="tl" id="flipLbl">NO FLIP YET</span><span class="tv" id="flipVal">&mdash;</span></div>
    </div>
  </section>

  <footer class="foot" id="foot"><span id="footText">updated &mdash;</span><span id="beat">&#9650;</span></footer>

</div>

<script>
"use strict";
/* ---------------------------------------------------------------- render
   Every value below that originated in the evidence log — the path, the
   timestamp, the status code, the backend word, the hostname, the error
   detail — is assigned through textContent. The request path is
   attacker-influenced and reaches this projector verbatim: a live payload was
   demonstrated surviving intact through $uri into the JSON, so the escaping
   burden sits entirely here. textContent also makes the 28-character
   truncation safe, since cutting a plain string cannot sever an entity. */
var $ = function(id){ return document.getElementById(id); };
var txt = function(el, s){ el.textContent = s; };

var EM = "—";
var POLL_MS = 1000;
var WATCHDOG_MS = 5000;
var STALE_MS = 3000;

var lastOkAt = Date.now();
var beatOn = true;

function backendClass(word){
  if (word === "OLD") return "b-OLD";
  if (word === "NEW") return "b-NEW";
  return "b-none";
}

/* ------------------------------------------------------- the two readings */
function renderConfig(data){
  var chip = $("cfgWord");
  chip.className = "chip " + backendClass(data.config);
  txt(chip, data.config || EM);
}

function renderTraffic(data){
  var banner = $("traffic"), hero = $("heroWord"), sub = $("trafficSub");
  banner.className = "traffic " + backendClass(data.traffic);
  hero.className = "hero" + (data.traffic ? "" : " muted");
  txt(hero, data.traffic || EM);
  if (data.traffic){
    txt(sub, "last answered by " + (data.traffic_host || data.traffic) +
             " · " + (data.traffic_at || ""));
  } else {
    txt(sub, "NO TRAFFIC OBSERVED YET");
  }
}

var SYNC_CAP = {
  IN_SYNC: "IN SYNC",
  PENDING: "↓ WAITING FOR RELOAD",
  AWAITING_FIRST_REQUEST: "AWAITING FIRST REQUEST",
  CANNOT_DETERMINE: "CANNOT DETERMINE"
};

function renderSync(data){
  txt($("syncCap"), SYNC_CAP[data.sync] || SYNC_CAP.CANNOT_DETERMINE);
  $("page").classList.toggle("pending", data.sync === "PENDING");
}

/* -------------------------------------------- the recent-requests table */
var PATH_MAX = 28;

function el(tag, cls, text){
  var n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text !== undefined) txt(n, text);   /* never the markup-parsing property */
  return n;
}

function clear(node){ while (node.firstChild) node.removeChild(node.firstChild); }

function shortPath(p){
  p = String(p == null ? "" : p);
  return p.length > PATH_MAX ? p.slice(0, PATH_MAX - 1) + "…" : p;
}

function rowEl(r){
  var row = el("div", "row " + backendClass(r.backend));
  row.appendChild(el("span", "bar"));
  row.appendChild(el("span", "c-time", r.time || ""));
  row.appendChild(el("span", "c-path", shortPath(r.path)));
  row.appendChild(el("span", "c-status", String(r.status == null ? "" : r.status)));
  row.appendChild(el("span", "c-backend", r.backend || ""));
  return row;
}

function boundaryEl(b){
  var wrap = el("div", "bnd");
  wrap.appendChild(el("div", "bnd-rule"));
  wrap.appendChild(el("div", "bnd-cap",
    "▲ FLIP LANDED · " + (b.at || "") + " · " + (b.from || "") + " → " + (b.to || "")));
  wrap.appendChild(el("div", "bnd-rule"));
  return wrap;
}

function emptyEl(){
  var wrap = el("div", "empty");
  wrap.appendChild(el("div", "eh", "NO TRAFFIC OBSERVED YET"));
  wrap.appendChild(el("div", "eb",
    "Send a request to http://app.demo.test:9092/ and it will appear here."));
  return wrap;
}

/* The table shrinks to its REAL content. Three rows and a boundary is three
   rows and a boundary, never three rows plus four blank ones. */
function renderTable(data){
  var body = $("tbody");
  clear(body);
  var rows = data.rows || [];
  if (!rows.length){ body.appendChild(emptyEl()); return; }
  /* boundary.row_index is the count of rows rendered ABOVE the boundary and is
     supplied by the service. Recomputing it here would put the windowing logic
     in two places that can disagree. */
  var at = data.boundary ? data.boundary.row_index : -1;
  for (var i = 0; i < rows.length; i++){
    if (i === at) body.appendChild(boundaryEl(data.boundary));
    body.appendChild(rowEl(rows[i]));
  }
  if (at === rows.length) body.appendChild(boundaryEl(data.boundary));
}

/* ---------------------------------------------------------- the stats rail */
function fmtCount(n){
  n = Number(n) || 0;
  if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";   /* nobody reads the 6th digit at 10 m */
  if (n >= 1e5) return (n / 1e3).toFixed(1) + "K";
  return n.toLocaleString("en-US");
}

/* Formatted from the server-supplied since_flip_s on every poll. A client-side
   interval keeps counting while the service is dead, which is precisely the
   stale-but-plausible failure D-28 forbids. */
function fmtSince(s){
  var t = Math.max(0, Math.round(Number(s)));
  if (t >= 3600) return "59:59+";
  var m = Math.floor(t / 60), ss = t % 60;
  return m + ":" + (ss < 10 ? "0" : "") + ss;
}

function renderRail(data){
  var c = data.counts || { OLD: 0, NEW: 0 };
  txt($("cOld"), fmtCount(c.OLD));
  txt($("cNew"), fmtCount(c.NEW));
  if (data.since_flip_s == null){
    txt($("flipLbl"), "NO FLIP YET");
    txt($("flipVal"), EM);
  } else {
    txt($("flipLbl"), "SINCE FLIP");
    txt($("flipVal"), fmtSince(data.since_flip_s));
  }
}

/* ------------------------------------------------------------- the footer */
function renderFoot(data, ageMs){
  var foot = $("foot"), stale = ageMs > STALE_MS;
  foot.classList.toggle("stale", stale);
  if (stale){
    txt($("footText"), "stale " + Math.round(ageMs / 1000) + "s · src " + (data.log_path || ""));
  } else {
    txt($("footText"), "updated " + (data.served_at || EM) +
                       " · src " + (data.log_path || "") + " · ");
  }
}

function beat(){
  beatOn = !beatOn;
  $("beat").style.opacity = beatOn ? "1" : "0.35";
}

/* --------------------------------------------------------------- the poll */
function render(data){
  if (data.log_path) lastLogPath = data.log_path;
  lastData = data;
  renderConfig(data);
  renderTraffic(data);
  renderSync(data);
  renderTable(data);
  renderRail(data);
  renderFoot(data, Date.now() - lastOkAt);
}

function poll(){
  fetch("/api/status", { cache: "no-store" })
    .then(function(r){ if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(data){ lastOkAt = Date.now(); beat(); render(data); })
    .catch(function(){ /* the watchdog owns the failure path */ });
}

/* The watchdog. This is the only mechanism that can detect the page's own
   server dying: a bare meta-refresh either renders the browser's error page or
   leaves the last good render on screen indefinitely, which is D-28's
   forbidden failure arriving through the refresh mechanism. */
function watchdog(){
  var age = Date.now() - lastOkAt;
  if (age > WATCHDOG_MS){ render(unreachable()); return; }
  /* Only the footer's own age reading moves between polls — the watchdog must
     not overwrite the served_at the last good poll established. */
  renderFoot(lastData, age);
}

var lastLogPath = "";
var lastData = { log_path: "", served_at: null };
function unreachable(){
  return {
    state: "UNAVAILABLE", failing_source: "status",
    detail: "/api/status — no response in " + (WATCHDOG_MS / 1000) + "s",
    config: null, traffic: null, traffic_host: null, traffic_at: null,
    sync: "CANNOT_DETERMINE", counts: { OLD: 0, NEW: 0 }, rows: [],
    boundary: null, since_flip_s: null, served_at: null, log_path: lastLogPath
  };
}

poll();
setInterval(poll, POLL_MS);
setInterval(watchdog, 250);
</script>
</body>
</html>
