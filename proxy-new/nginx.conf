# proxy-new/nginx.conf — static transparent proxy → server-new (Phase 5 form).
#
# Exact mirror of proxy-old/nginx.conf. Two string deltas only: the HTTP
# upstream serves server-new:80 and the SSH stream serves server-new:22.
# Everything else is byte-identical (the app-new.demo.test alias is set in
# compose, not here).

worker_processes 1;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;

    # STATIC — the one HTTP delta vs proxy-old. Declared BEFORE the server so a
    # static-name proxy_pass resolves against the declared group; nginx resolves
    # `server server-new:80` at parse time, so `depends_on: server-new` gates it.
    upstream backend { server server-new:80; }

    server {
        listen 80;
        default_type text/plain;

        location / {
            # Static name, no $variable, no map, no trailing slash — a
            # transparent single-upstream forward. A trailing slash would make
            # nginx substitute the URI instead of passing the original through.
            proxy_pass http://backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # NO add_header X-Backend — the backend owns identity. nginx forwards
            # the backend's own X-Backend/X-Backend-Host response headers
            # untouched across this hop; a proxy-emitted identity would corrupt
            # the evidence chain (EV2-02 integrity, T-05-01).
        }
    }

    # The compose healthcheck target. Reuses v1's proven :8081 idiom — curl is in
    # the stock nginx:1.30-alpine image, no apk add, no build. access_log off so
    # the 3-second healthcheck never appears anywhere.
    server {
        listen 8081;
        access_log off;
        default_type text/plain;

        location = /nginx-health { return 200 "ok\n"; }
    }
}

# THE STREAM BLOCK — configured now, inert until Phase 6 wires the switch's own
# SSH:22 (RESEARCH A2). Shipping it here makes PROX-02 "never reconfigured"
# literally true from birth: this proxy relays SSH to its one fixed backend on
# port 22, and app-new.demo.test:22 (the compose alias) is reachable directly
# this phase. nginx relays bytes here and parses nothing — a real transport-level
# migration, demonstrably not an HTTP trick.
stream {
    upstream ssh { server server-new:22; }
    server {
        listen 22;
        proxy_pass ssh;
    }
}
