# switch/nginx.conf — the flip surface + evidence writer (Phase 5 form).
#
# This is v1's proxy/nginx.conf http block, re-homed. The switch no longer
# talks to the backends directly: its upstreams now point at the two static
# proxies (proxy-old / proxy-new), and the selector it flips names a PROXY, not
# a backend. The variable stays $active_backend and the old/new labels are
# retained for continuity with v1's mechanism and the status page's vocabulary.
#
# Phase 5 ships NO stream block on the switch (the switch's SSH:22 is SW-03 /
# Phase 6, mirroring how v1 Phase 1 shipped HTTP-only). The two static proxies
# carry the SSH stream this phase.

worker_processes 1;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;

    # Phase 2's EVID-01 is written against these exact field names. The
    # `backend=` field renders the word OLD/NEW that the audience reads as the
    # flip lands; it is populated from the BACKEND'S OWN X-Backend response
    # header (D-11), forwarded untouched across both hops, never from anything
    # this switch or the static proxies assert.
    log_format demo '$remote_addr -> $host:$server_port "$request" '
                    '$status upstream=$upstream_addr backend=$upstream_http_x_backend '
                    'rt=$request_time urt=$upstream_response_time';

    # The SECOND format, for a different audience: machines. One JSON object per
    # line, consumed by the status service (Phase 2 plan 02).
    #
    # The JSON escaping below is a security control, not a convenience. The path is
    # attacker-controlled and lands verbatim in this file; JSON escaping turns a
    # `%0a` in a path into a literal two-character escape INSIDE the string, so
    # three crafted requests produce exactly three lines. A delimited format
    # would let an audience member on the presenter's laptop forge a
    # `backend=NEW` evidence row.
    #
    # $msec as well as $time_iso8601: the latter has one-second resolution and
    # cannot order requests inside the flip window, and the since-flip clock
    # needs sub-second arithmetic. Note `demo` above carries no timestamp at all.
    #
    # `remote` (EV2-01) is the switch's $remote_addr — and because the switch is
    # now the FRONT tier, that is the real client's address (verified two-hop:
    # the static proxies forward with X-Real-IP/X-Forwarded-For, but the switch
    # sees the client directly). `bhost` is the backend's OWN hostname header. No
    # tier of this rig ever synthesises an identity — if a header is absent the
    # field is empty, which is the honest record.
    log_format evidence escape=json
        '{"t":"$time_iso8601","ms":"$msec","remote":"$remote_addr","path":"$uri","req":"$request_uri",'
        '"status":$status,"backend":"$upstream_http_x_backend",'
        '"bhost":"$upstream_http_x_backend_host","upstream":"$upstream_addr",'
        '"host":"$host","port":"$server_port"}';

    # TWO SINKS, ONE REQUEST. nginx fans out to every access_log in scope — this
    # is an addition, not a migration. The stdout line above stays exactly as
    # Phase 1 wrote it (D-31) and two Phase 1 assertions still grep it.
    #
    # stdout, not a file: `docker compose logs -f switch` IS the live tail.
    access_log /dev/stdout demo;
    # The evidence file. The path is deliberately NOT the image's own log
    # directory: that ships access.log as a symlink to the process stdout, a
    # volume mounted over it pre-populates from the image layer including the
    # symlink, and a reader then blocks forever instead of erroring — a FROZEN
    # status page on stage rather than an honest UNAVAILABLE banner.
    access_log /var/log/demo/access.log evidence;
    error_log  /dev/stderr notice;

    # Declared BEFORE the include. nginx resolves a variable proxy_pass against
    # declared upstream group names first, so no `resolver` directive is needed.
    # RE-POINTED for Phase 5: the switch talks to the static proxies, not the
    # backends. old->proxy-old:80 (was server-old:80), new->proxy-new:80.
    upstream old { server proxy-old:80; }
    upstream new { server proxy-new:80; }

    # The DIRECTORY is bind-mounted (RESEARCH Pitfall 10), so an editor that
    # replaces the file's inode on the presenter's machine cannot leave the
    # container holding stale content.
    include /etc/nginx/demo/active-proxy.conf;   # <- defines $active_backend

    # Lives HERE, not in active-proxy.conf, so the file the audience reads on
    # screen during the flip stays five lines. A typo'd selector passes
    # `nginx -t` and reloads cleanly, then 502s every request (Pitfall 3); this
    # turns that into a legible 503.
    map $active_backend $backend_is_valid {
        default 0;
        old     1;
        new     1;
    }

    # HTTP-01/02: transparent reverse proxy. The client's URL never changes.
    server {
        listen 9092;
        default_type text/plain;

        if ($backend_is_valid = 0) {
            return 503 "INVALID BACKEND '$active_backend' in active-proxy.conf - expected 'old' or 'new'\n";
        }

        location / {
            # NO trailing slash after the variable: a trailing slash makes nginx
            # substitute the URI instead of passing the original through.
            proxy_pass http://$active_backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # HTTP-03/04: the OTHER way of doing it. A dedicated listener (D-08), not a
    # path or a Host rule on 9092 — "port 9092 is the migration endpoint" has to
    # stay a clean, unqualified framing.
    #
    # The client is TOLD to go somewhere else and its URL bar says so. That is
    # the whole contrast: 9092 answers on the backend's behalf, 9093 sends you
    # away. Side by side, the audience sees why only one of them lets a
    # migration happen without the client noticing.
    server {
        listen 9093;

        location / {
            # 301, not 302: a permanent move is what a real hostname migration
            # emits and it is the code the audience expects. The cost is that
            # browsers cache it indefinitely — handled by README's incognito
            # instruction, not by weakening the status code (RESEARCH Pitfall 7).
            #
            # The target is LITERAL, never derived from $host. Two reasons, both
            # load-bearing: a fixed address is readable on screen so the audience
            # can see exactly where the client is being sent, and a Location built
            # from the request's own Host header is a textbook open redirect. This
            # form has no such surface at all (T-01-13).
            #
            # $request_uri carries the requested path across the hop, so /whoami
            # on 9093 lands on /whoami at the backend.
            #
            # Reachable from the HOST browser via D-03's /etc/hosts entry plus the
            # published 9090 — NOT from the client container, where app.demo.test
            # resolves to this switch, which does not listen on 9090.
            return 301 http://app.demo.test:9090$request_uri;
        }
    }

    # The internal listener. UNPUBLISHED — no compose `ports:` entry maps it to
    # the host, so it is reachable only from inside this container and from
    # other containers on the demo network. It does three jobs at once:
    #
    #   1. The compose healthcheck target for this container. Deliberately NOT
    #      :9092 — the smoke suite writes an invalid selector there on purpose
    #      and the container would flap unhealthy mid-suite.
    #   2. The RELOAD ORACLE. The running config reporting its own selector is
    #      the only source that cannot lie. A request through :9092 cannot
    #      distinguish "the reload failed" from "the reload landed and this
    #      request raced the interleave window".
    #   3. The status service's independent proxy-liveness probe. A readable
    #      log file is not proof the switch is alive.
    #
    # Turning logging off here is LOAD-BEARING: it suppresses BOTH inherited
    # sinks at once. Without it the 3-second healthcheck would push a request
    # nobody made into the projected evidence table every interval.
    server {
        listen 8081;
        access_log off;
        default_type text/plain;

        location = /nginx-health { return 200 "ok\n"; }
        location = /active-proxy { return 200 "$active_backend\n"; }
    }
}

# This switch sets NO identity header of its own. proxy_pass forwards the
# backend's own response headers to the client verbatim across both hops, and
# the same value reaches the log as $upstream_http_x_backend. A switch-emitted
# identity would make the demo assert something it never observed (EV2-02).
#
# Reload discipline: `nginx -t`, then `nginx -s reload`, then prove it landed via
# :8081/active-proxy. Never a container restart (D-14).
#
# ---------------------------------------------------------------------------
# THE SSH:22 STREAM FLIP (Phase 6 / SW-03). Re-homed verbatim from v1's
# proxy/nginx.conf stream block (git rev 3b7dc6c) with EXACTLY three string
# deltas: the two upstreams now target the static proxies on :22 (was
# server-old/new:22), and the shared include is demo/active-proxy.conf (was
# demo/active-backend.conf) — mirroring the http block's own Phase-5 re-point
# at lines 72-73,78. Everything else is v1 verbatim.
#
# This is raw TCP. nginx relays bytes here and parses nothing: there is no
# request, no header, no status code of the backend's own. That is the point —
# SSH through this listener is a real transport-level migration, demonstrably
# not an HTTP trick. The switch now flips BOTH protocols from the ONE map file:
# active-proxy.conf is included by the http block AND by this stream block, so a
# single `flip.sh` reload cuts over HTTP:9092 and SSH:22 together (D-39/SW-03).
# ---------------------------------------------------------------------------
stream {
    # The stream context's own log format. It cannot reuse `demo` above: the
    # HTTP format's response-time and upstream-header variables have no stream
    # analogue, and a format referencing them would not load here.
    #
    # `backend=` deliberately reuses the HTTP log's field NAME so the existing
    # `make logs-demo` awk colours SSH lines for free, with no Makefile change.
    # The honesty cost is real and is paid here in full: the HTTP log's field is
    # THE BACKEND ASSERTING ITS OWN IDENTITY (it comes from the backend's own
    # response header), while this one is THE PROXY REPORTING ITS OWN SELECTOR —
    # nginx cannot read an identity out of an opaque TCP stream, and no tier of
    # this rig may claim an identity it did not observe. `selector=` is kept on
    # the SAME LINE precisely so any reader can see the proxy is reporting its
    # own choice rather than something it measured. The contractual identity
    # claim over SSH remains the backend's own pre-auth banner.
    #
    # `$status` here is nginx's OWN stream status, not a backend's: 200 for a
    # clean relay, 500 when the selector names no valid upstream.
    log_format demo_stream '$remote_addr -> :$server_port ssh backend=$stream_label '
                           'selector=$active_backend upstream=$upstream_addr status=$status '
                           'bytes=$upstream_bytes_sent/$upstream_bytes_received sess=$session_time';

    # STDOUT ONLY, and this is a correctness constraint rather than a preference.
    # The JSON evidence sink the http block writes to is consumed by the status
    # service, whose parser SKIPS any line that does not parse as JSON. Stream
    # lines sent there would therefore be silently discarded while still growing
    # a file the service rescans on every poll — invisible, unexplained, and
    # strictly worse than an error. D-46 keeps SSH out of the status page's
    # request table; this is the mechanical reason it must also stay out of its
    # sink.
    #
    # If a future phase ever does want SSH on the status page, the correct move
    # is a SECOND json-escaped format writing to a SEPARATE file — never
    # co-mingling in a sink whose whole design assumes one producer emitting one
    # JSON object per line.
    #
    # Note also that a stream line is written on CONNECTION CLOSE, not on
    # connect: a ten-minute SSH session logs nothing for ten minutes.
    access_log /dev/stdout demo_stream;

    # Declared BEFORE the include, exactly as the http block does, so a variable
    # proxy_pass resolves against declared group names and no `resolver`
    # directive is needed. Port 22 here, port 80 there — an upstream group is
    # NOT shareable between contexts, which is the whole reason the next line
    # works. RE-POINTED for Phase 6: the switch's stream talks to the static
    # proxies, not the backends. old->proxy-old:22 (was server-old:22),
    # new->proxy-new:22 (was server-new:22).
    upstream old { server proxy-old:22; }
    upstream new { server proxy-new:22; }

    # THE SAME FILE the http block includes. This is D-13's payoff, cashed in a
    # phase later: because an upstream cannot be shared across contexts,
    # Phase 1 put the SELECTOR in the shared file rather than the TARGET — and a
    # `map` IS valid in both contexts. `$active_backend` in http and
    # `$active_backend` in stream are two independent variables in two
    # independent namespaces, so the file is simply included twice at top level
    # with no restructuring of any kind. One file, one word, both protocols.
    include /etc/nginx/demo/active-proxy.conf;

    # The uppercase label, derived HERE and never in the shared file — that file
    # is the one on the projector during the flip and must stay five lines. The
    # fallback value is deliberately not a backend name: an unrecognised selector
    # must not be able to render as either identity.
    map $active_backend $stream_label {
        default "?";
        old     OLD;
        new     NEW;
    }

    # `listen 22;` binds the IPv4 wildcard ONLY (0.0.0.0:22) — sshd binds both
    # address families, this does not. Anything probing this listener must use
    # the IPv4 loopback literal rather than a name, because busybox resolvers try
    # ::1 first and do not retry the next family; compose.yaml documents the same
    # class of bug for the status service's healthcheck. Adding an IPv6 listener
    # would work but changes the demo's surface for no narrative gain, and
    # 0.0.0.0:22 reads more cleanly on screen.
    #
    # No port is published to the host (D-38): the `client` container is the
    # canonical SSH source, and inside this network the switch genuinely listens
    # on 22 — so "ssh on port 22" is literally true and the presenter's command
    # needs no port flag.
    #
    # There is deliberately NO stream analogue of the http block's
    # $backend_is_valid guard, and that is a decision rather than an oversight. A
    # stream block cannot serve a diagnostic an SSH client could render — an SSH
    # client handed arbitrary bytes just fails differently and less legibly. A
    # typo'd selector already produces nginx's own `no port in upstream` error
    # line plus status=500 in the log above, which is a legible diagnosis, and
    # the http guard returns a 503 naming the offending value seconds earlier in
    # the presenter's day.
    #
    # The switch sets NO worker-shutdown grace period anywhere (D-40): a session
    # opened before the flip stays on its original backend for its whole life;
    # only a FRESH connection after the reload lands on the new one.
    server {
        listen 22;
        proxy_pass $active_backend;
    }
}
